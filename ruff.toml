# ruff.toml
# Ruff configuration for Darf UI python backend

line-length = 120
target-version = "py310"

[lint]
# Enable Pyflakes (F) and PEP8 (E, W) codes by default, plus import sorting (I) and bugbear (B)
select = [
    "F",      # Pyflakes
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "I",      # isort import sorting
    "B",      # flake8-bugbear (common design issues)
    "UP",     # pyupgrade (modernize syntax)
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
]

ignore = [
    "E501",   # Ignore line length violations (since line-length is set above, but sometimes we want long comments)
    "B008",   # Ignore function calls in argument defaults (FastAPI Depends)
]

[lint.isort]
combine-as-imports = true
known-first-party = ["app"]
